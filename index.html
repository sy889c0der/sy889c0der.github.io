<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Songyu | Digital Media Art</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Inter:wght@200;300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0b132b;font-family:'Inter',sans-serif;cursor:none}

/* ---- Spotlight circle ---- */
#spotlight{position:fixed;z-index:999;pointer-events:none;width:240px;height:240px;border-radius:50%;background:#0a0a0a;transform:translate(-50%,-50%);opacity:0;transition:opacity 0.25s;overflow:hidden}
#spotlight.show{opacity:1}
.spot-inner{position:absolute;width:240px;height:240px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.spot-inner h1{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;color:#fff;margin-bottom:4px}
.spot-inner .spot-line{width:36px;height:1px;background:rgba(255,255,255,0.3);margin:8px 0}
.spot-inner .spot-sub{font-size:13px;color:rgba(255,255,255,0.5);letter-spacing:3px}

/* ---- Main content ---- */
.hero{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10}
.hero-title{font-family:'Playfair Display',serif;font-size:clamp(36px,6.5vw,90px);font-weight:900;color:rgba(255,255,255,0.92);letter-spacing:2px;text-align:center;text-shadow:0 0 10px rgba(255,255,255,0.1),0 0 30px rgba(255,210,120,0.4),0 0 60px rgba(255,180,60,0.25),0 4px 40px rgba(0,0,0,0.5)}
.hero-line{width:60px;height:1px;background:rgba(255,255,255,0.2);margin:22px auto}
.hero-sub{font-family:'Playfair Display',serif;font-size:15px;font-weight:300;font-style:italic;letter-spacing:8px;color:rgba(255,255,255,0.4);text-align:center}
.hero-desc{font-size:13px;color:rgba(255,255,255,0.25);letter-spacing:2px;margin-top:16px;text-align:center}

/* ---- ENTER button ---- */
.enter-btn{position:fixed;bottom:48px;left:48px;z-index:100;display:flex;align-items:center;gap:12px;padding:16px 28px;background:rgba(255,255,255,0.05);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.1);border-radius:16px;color:rgba(255,255,255,0.8);font-family:'Inter',sans-serif;font-size:13px;font-weight:400;letter-spacing:3px;text-decoration:none;text-transform:uppercase;transition:all 0.4s cubic-bezier(0.25,0.8,0.25,1.2);box-shadow:0 8px 32px rgba(0,0,0,0.3)}
.enter-btn:hover{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.25);box-shadow:0 12px 40px rgba(0,0,0,0.4),0 0 30px rgba(255,210,120,0.1);color:#fff}
.enter-btn .arw{display:inline-block;transition:transform 0.35s;font-size:16px}
.enter-btn:hover .arw{transform:translateX(5px)}
</style>
</head>
<body>

<section class="hero">
  <h1 class="hero-title">HELLO, I'M Songyu</h1>
  <div class="hero-line"></div>
  <p class="hero-sub">A digital media art cutie</p>
  <p class="hero-desc">Specializing in UI/UX and 3D interactive experiences.</p>
</section>

<a href="./3d-garden.html" class="enter-btn">ENTER 3D FOREST <span class="arw">→</span></a>

<div id="spotlight">
  <div class="spot-inner">
    <h1>你好，我是宋宇</h1>
    <div class="spot-line"></div>
    <p class="spot-sub">数字媒体艺术的一名小可爱</p>
  </div>
</div>

<script>
// ---- Spotlight black circle ----
const spotlight = document.getElementById('spotlight');
let mx = -999, my = -999;

document.addEventListener('mousemove', (e) => {
  mx = e.clientX; my = e.clientY;
  spotlight.classList.add('show');
});
document.addEventListener('mouseleave', () => spotlight.classList.remove('show'));

function animate() {
  requestAnimationFrame(animate);
  const tx = mx, ty = my;
  let sx = parseFloat(spotlight.style.left) || tx;
  let sy = parseFloat(spotlight.style.top) || ty;
  sx += (tx - sx) * 0.12;
  sy += (ty - sy) * 0.12;
  spotlight.style.left = sx + 'px';
  spotlight.style.top = sy + 'px';
}
animate();

console.log('Index page loaded');
</script>
</body>
</html>

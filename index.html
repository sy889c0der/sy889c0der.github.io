<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wilderness 路 Immersive Forest</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400&family=Inter:wght@200;300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #0a1128; font-family: 'Inter', sans-serif; cursor: none; }
  canvas { display: block; position: fixed; top: 0; left: 0; z-index: 0; cursor: none; }

  /* ============ HORIZONTAL SCROLL ============ */
  .app-container {
    position: fixed; inset: 0; z-index: 5;
    overflow: hidden;
    display: flex; flex-wrap: nowrap;
    scroll-snap-type: x mandatory; gap: 0;
  }
  .app-container::-webkit-scrollbar { height: 6px; }
  .app-container::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
  .app-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
  .scroll-content {
    display: flex; flex-wrap: nowrap; gap: 0;
    width: 100vw; min-width: 100vw; height: 100vh;
    cursor: default;
  }
  .scroll-content.grabbing { cursor: grabbing; }
  .panel { position:relative; z-index:5;
    flex: 0 0 100vw; width: 100vw; min-width: 100vw; height: 100vh;
    flex-shrink: 0; box-sizing: border-box; margin: 0; padding: 0;
    scroll-snap-align: start; position: relative; overflow: hidden;
  }

  /* ============ PANEL 1: LAYOUT ============ */
  .layout { position: relative; width: 100%; height: 100%; display: flex; flex-direction: row; pointer-events: none; }
  .layout > * { pointer-events: auto; }
  #left-nav { position: fixed; left: 30px; top: 50%; transform: translateY(-50%); z-index: 999; pointer-events: auto; }
  #right-content { width: 80%; display: flex; flex-direction: column; align-items: center; justify-content: center; }

  /* ============ LEFT NAV DOTS ============ */
  .nav-bar { display: flex; flex-direction: column; gap: 25px; align-items: center; }
  .nav-bar a {
    display: block; width: 12px; height: 12px; border-radius: 50%;
    background: rgba(255,255,255,0.25); font-size: 0; text-indent: -9999px; overflow: hidden;
    transition: all 0.45s cubic-bezier(0.4,0,0.2,1); position: relative;
  }
  .nav-bar a::after { content: ''; position: absolute; inset: -4px; border-radius: 50%; background: transparent; transition: all 0.45s; }
  .nav-bar a:hover { background: rgba(180,220,160,0.7); box-shadow: 0 0 14px 3px rgba(160,200,140,0.5); transform: scale(1.8); }
  .nav-bar a.active {
    background: radial-gradient(circle at 35% 30%, rgba(220,255,200,0.95), rgba(150,200,130,0.8));
    box-shadow: 0 0 0 5px rgba(140,200,120,0.2), 0 0 16px 4px rgba(160,210,140,0.4);
    transform: scale(1.4); animation: dewdrop-breathe 3s ease-in-out infinite;
  }
  .nav-bar a.inactive { transform: scale(0.5); opacity: 0.35; }
  @keyframes dewdrop-breathe {
    0%,100% { box-shadow: 0 0 0 5px rgba(140,200,120,0.2), 0 0 16px 4px rgba(160,210,140,0.4); }
    50% { box-shadow: 0 0 0 9px rgba(140,200,120,0.1), 0 0 22px 6px rgba(160,210,140,0.55); }
  }

  /* ============ HERO ============ */
  .hero {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    pointer-events: none; text-align: center;
    display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 50;
  }
  .hero > * { pointer-events: auto; }
  .hero-title {
    font-family: 'Playfair Display', 'Cormorant Garamond', 'Georgia', serif;
    font-size: clamp(36px, 6.8vw, 90px); font-weight: 800;
    color: rgba(255,255,255,0.95); letter-spacing: 2px; text-align: center; white-space: nowrap;
    text-shadow: 0 0 18px rgba(255,210,120,0.35), 0 0 45px rgba(255,170,60,0.18), 0 0 80px rgba(200,150,60,0.1), 0 2px 30px rgba(0,0,0,0.5);
    animation: fadeUp 1.2s cubic-bezier(0.4,0,0.2,1);
  }
  .hero-letter { display: inline-block; transition: transform 0.3s ease; }
  .hero-title:hover .hero-letter { animation: sway 2.4s ease-in-out infinite; }
  .hero-letter:hover { animation: sway 1.6s ease-in-out infinite !important; color: #fff; text-shadow: 0 0 20px rgba(255,255,255,0.4), 0 2px 30px rgba(0,0,0,0.6); }
  @keyframes sway {
    0%,100% { transform: translateY(0) translateX(0) rotate(0deg); }
    15% { transform: translateY(-2px) translateX(0.8px) rotate(0.4deg); }
    30% { transform: translateY(-0.5px) translateX(1.4px) rotate(0.8deg); }
    45% { transform: translateY(-1.8px) translateX(0.3px) rotate(0.3deg); }
    60% { transform: translateY(-0.2px) translateX(-1px) rotate(-0.5deg); }
    75% { transform: translateY(-1.2px) translateX(-0.6px) rotate(-0.7deg); }
    90% { transform: translateY(0.3px) translateX(0.5px) rotate(0.2deg); }

  /* Songyu name emphasis */
  .hero-title .hero-letter:nth-child(n+12):nth-child(-n+17) {
    font-weight: 900;
    text-shadow: 0 0 24px rgba(255,220,140,0.5), 0 0 50px rgba(255,180,60,0.25), 0 2px 30px rgba(0,0,0,0.5);
  }  }
  .hero-line {
    width: 80px; height: 1px; background: rgba(255,255,255,0.25); margin: 24px auto;
    animation: fadeUp 1.4s cubic-bezier(0.4,0,0.2,1); animation-fill-mode: both; animation-delay: 0.2s;
  }
  .hero-sub {
    font-family: 'Cormorant Garamond', 'Noto Serif SC', serif;
    font-size: 15px; font-weight: 300; letter-spacing: 10px;
    color: rgba(255,255,255,0.45); text-align: center;
    text-shadow: 0 1px 12px rgba(0,0,0,0.4);
    animation: fadeUp 1.4s cubic-bezier(0.4,0,0.2,1); animation-fill-mode: both; animation-delay: 0.35s;
  }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

  /* ============ PANEL 1 BACKGROUND ============ */
  .bg-mountains { position: absolute; bottom: 0; left: 0; width: 100%; height: 30%; pointer-events: none; z-index: 2; }
  .bg-mountains svg { width: 100%; height: 100%; }
  .bg-fog {
    position: absolute; bottom: 0; left: 0; width: 100%; height: 35%; z-index: 4; pointer-events: none;
    background: linear-gradient(180deg, transparent 0%, rgba(10,30,8,0.3) 50%, rgba(5,15,4,0.6) 100%);
  }
  .bg-grass {
    position: absolute; bottom: 0; left: 0; width: 100%; height: 25%; z-index: 4; pointer-events: none;
    background: linear-gradient(180deg, rgba(8,25,6,0.4) 0%, rgba(4,15,4,0.8) 60%, rgba(2,8,3,0.95) 100%);
  }
  .bg-tree { position: absolute; pointer-events: none; z-index: 3; transform-origin: bottom center; }
  .bg-tree-1 { right: 8%; bottom: 18%; transform: scale(0.35); opacity: 0.6; }
  .bg-tree-2 { right: 28%; bottom: 10%; transform: scale(0.28); opacity: 0.5; }
  .bg-tree-3 { right: 55%; bottom: 22%; transform: scale(0.32); opacity: 0.55; }
  .bg-trunk { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 10px; height: 60px; background: linear-gradient(90deg, #1a0f05, #3a2010 50%, #1a0f05); border-radius: 2px 2px 0 0; }
  .bg-pine { position: absolute; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 24px solid transparent; border-right: 24px solid transparent; border-bottom: 40px solid #1e4018; }
  .bg-pine.l1 { bottom: 45px; border-bottom-color: #1e4018; }
  .bg-pine.l2 { bottom: 55px; border-left-width: 20px; border-right-width: 20px; border-bottom-color: #254a1e; }
  .bg-pine.l3 { bottom: 65px; border-left-width: 16px; border-right-width: 16px; border-bottom-color: #2a5522; }
  .bg-pine.l4 { bottom: 73px; border-left-width: 12px; border-right-width: 12px; border-bottom-color: #306028; }
  .bg-blob { position: absolute; border-radius: 40% 55% 45% 50%; background: radial-gradient(ellipse at 35% 30%, #2a5522, #1a3514); }
  .bg-blob.b1 { bottom: 35px; left: -20px; width: 45px; height: 40px; }
  .bg-blob.b2 { bottom: 45px; left: -10px; width: 40px; height: 35px; }
  .bg-blob.b3 { bottom: 40px; left: 8px; width: 35px; height: 38px; }
  .bg-blob.b4 { bottom: 50px; left: -5px; width: 32px; height: 30px; }
  .bush { position: absolute; pointer-events: none; z-index: 5; background: radial-gradient(ellipse at center, rgba(60,140,40,0.35) 0%, rgba(30,80,20,0.1) 50%, transparent 70%); border-radius: 50%; }
  .bush-1 { right: 18%; bottom: 16%; width: 100px; height: 50px; }
  .bush-2 { right: 38%; bottom: 8%; width: 80px; height: 40px; }
  .bush-3 { right: 60%; bottom: 18%; width: 70px; height: 35px; }

  

/* ============ SPOTLIGHT BLACK CIRCLE ============ */
#spotlight{position:fixed;z-index:999;pointer-events:none;width:220px;height:220px;border-radius:50%;background:#0a0a0a;transform:translate(-50%,-50%);opacity:0;transition:opacity 0.25s ease;overflow:hidden;}
#spotlight.visible{opacity:1;}
.spotlight-inner{position:absolute;display:flex;flex-direction:column;align-items:center;justify-content:center;}
/* ============ END SPOTLIGHT ============ */
/* ============ LEAF CURSOR ============ */
  #leaf-cursor { position: fixed; z-index: 9999; pointer-events: none; width: 18px; height: auto; transition: transform 0.08s ease-out; }
  #leaf-cursor.clicking { transform: scale(0.75); }
  #leaf-cursor.hovering-interactive { transform: scale(1.5); filter: drop-shadow(0 0 6px rgba(140,255,100,0.5)); }

  /* ============ PROGRESS BAR ============ */
  .scroll-progress-bar {
    position: fixed; bottom: 0; left: 0; height: 2px; z-index: 200; pointer-events: none;
    background: linear-gradient(90deg, rgba(160,210,140,0.6), rgba(200,240,180,0.3));
    box-shadow: 0 0 6px rgba(160,210,140,0.5); width: 0%; transition: width 0.15s ease-out;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="app-container">
  <div class="scroll-content">

    <!-- ===== PANEL 1: FOREST (0-33%) ===== -->
    <div class="panel panel-1">
<div class="layout">

  <aside id="left-nav">
    <nav class="nav-bar">
      <a href="#" class="active" title="Scene 1"></a>
      <a href="#" title="Scene 2"></a>
      <a href="#" title="Scene 3"></a>
      <a href="#" title="Scene 4"></a>
    </nav>
  </aside>

  <main id="right-content">
    <div class="bg-mountains">
      <svg viewBox="0 0 1200 200" preserveAspectRatio="none"><path d="M0,200 L0,100 Q150,50 300,90 Q450,30 550,70 Q650,20 750,60 Q850,15 950,50 Q1050,10 1150,45 L1200,30 L1200,200Z" fill="rgba(20,40,16,0.4)"/><path d="M0,200 L0,130 Q200,70 400,110 Q550,50 650,85 Q750,40 850,75 Q950,35 1050,65 Q1150,25 1200,55 L1200,200Z" fill="rgba(25,45,18,0.5)"/></svg>
    </div>
    <div class="bg-fog"></div>
    <div class="bg-grass"></div>

    <section class="hero" id="hero-section">
      <h1 class="hero-title">HELLO, I'M Songyu</h1>
      <div class="hero-line"></div>
      <p class="hero-sub">A digital media art cutie</p>
    </section>
  </main></div></div></div><!-- /app-container -->

</div>
    </div>

    </div><!-- /app-container -->


<div id="leaf-cursor"></div>
<div class="scroll-progress-bar"></div>

<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
</script>
<script src="forest-engine.js"></script>

  <canvas id="three-canvas" style="position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:1;"></canvas>
  <!-- SPOTLIGHT BLACK CIRCLE -->
  <div id="spotlight">
    <div class="spotlight-clone">
      <div class="s-title"><span class="hero-letter" style="--i:0; animation-delay:0s">你</span><span class="hero-letter" style="--i:1; animation-delay:0.03s">好</span><span class="hero-letter" style="--i:2; animation-delay:0.06s">，</span><span class="hero-letter" style="--i:3; animation-delay:0.09s">我</span><span class="hero-letter" style="--i:4; animation-delay:0.12s">是</span><span class="hero-letter" style="--i:5; animation-delay:0.15s">宋</span><span class="hero-letter" style="--i:6; animation-delay:0.18s">宇</span></div>
      <div class="s-line"></div>
      <div class="s-sub">数字媒体艺术的一名小可爱</div>
    </div>
  </div>
<script>
// ===== LETTER SPLIT =====
(function(){
  var title = document.querySelector('.hero-title');
  if (!title) return;
  var text = title.textContent;
  var html = '';
  for (var i = 0; i < text.length; i++) {
    var ch = text[i];
    if (ch === ' ') { html += ' '; }
    else { html += '<span class="hero-letter" style="--i:' + i + '; animation-delay:' + (i * 0.03) + 's">' + ch + '</span>'; }
  }
  title.innerHTML = html;
})();

// ===== SPOTLIGHT BLACK CIRCLE =====
(function(){
  var spotlight = document.getElementById('spotlight');
  if (!spotlight) return;
  var inner = spotlight.querySelector('.spotlight-inner');
  var hero = document.querySelector('.hero');
  if (!hero || !inner) return;
  var mx=-500,my=-500,sx=-500,sy=-500;
  document.addEventListener('mousemove',function(e){mx=e.clientX;my=e.clientY;spotlight.classList.add('visible');});
  document.addEventListener('mouseleave',function(){spotlight.classList.remove('visible');});
  function sync(){
    var hr=hero.getBoundingClientRect(), sr=spotlight.getBoundingClientRect();
    inner.style.left=(hr.left-sr.left)+'px'; inner.style.top=(hr.top-sr.top)+'px';
    inner.style.width=hr.width+'px'; inner.style.height=hr.height+'px';
  }
  function anim(){
    sx+=(mx-sx)*0.18; sy+=(my-sy)*0.18;
    spotlight.style.left=sx+'px'; spotlight.style.top=sy+'px';
    sync(); requestAnimationFrame(anim);
  }
  anim();
})();
// ===== LEAF CURSOR =====
(function(){
  var svg = document.getElementById('leaf-cursor');
  svg.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 60"><path d="M 12 44 Q 11.5 50 12 54 Q 12 57 12 60" fill="none" stroke="#4a7c3f" stroke-width="0.8"/><path d="M 12 8 Q 12 2 18 6 Q 22 10 20 14 Q 22 18 16 22 Q 14 24 12 24 Q 10 24 8 22 Q 2 18 4 14 Q 2 10 6 6 Q 12 2 12 8Z" fill="#5a9e4b" stroke="#3d6b32" stroke-width="0.5" opacity="0.9"/><path d="M 12 12 L 12 44" fill="none" stroke="#3d6b32" stroke-width="0.6"/><path d="M 12 22 L 8 28 M 12 24 L 6 30 M 12 26 L 10 34" fill="none" stroke="#3d6b32" stroke-width="0.4" opacity="0.5"/></svg>';
  var mx = innerWidth / 2, my = innerHeight / 2;
  var lx = mx, ly = my, px = mx, py = my, svx = 0, svy = 0;
  document.addEventListener('mousemove', function(e) { mx = e.clientX; my = e.clientY; });
  document.addEventListener('mousedown', function() { svg.classList.add('clicking'); });
  document.addEventListener('mouseup', function() { svg.classList.remove('clicking'); });
  document.querySelectorAll('a, button, .nav-bar a').forEach(function(el) {
    el.addEventListener('mouseenter', function() { svg.classList.add('hovering-interactive'); });
    el.addEventListener('mouseleave', function() { svg.classList.remove('hovering-interactive'); });
  });
  function anim() {
    lx += (mx - lx) * 0.25; ly += (my - ly) * 0.25;
    var rvx = mx - px; px = mx; var rvy = my - py; py = my;
    svx += (rvx - svx) * 0.08; svy += (rvy - svy) * 0.08;
    var tilt = Math.hypot(svx, svy) > 0.3 ? Math.max(-14, Math.min(14, svx * 0.35)) : 0;
    svg.style.left = lx + 'px'; svg.style.top = ly + 'px';
    svg.style.transform = 'translate(-50%,-100%) rotate(' + tilt + 'deg)';
    requestAnimationFrame(anim);
  }
  anim();
})();

// ===== SCROLL + DRAG + PARALLAX =====
(function(){
    var container = document.querySelector('.app-container');
    if (!container) return;

    container.addEventListener('wheel', function(e) {
        e.preventDefault();
        container.scrollLeft += e.deltaY * 1.5;
    }, { passive: false });

    var isDown = false, startX = 0, scrollStart = 0;
    var scrollContent = document.querySelector('.scroll-content');

    container.addEventListener('mousedown', function(e) {
        isDown = true;
        if (scrollContent) scrollContent.classList.add('grabbing');
        container.style.userSelect = 'none';
        startX = e.pageX;
        scrollStart = container.scrollLeft;
    });

    window.addEventListener('mousemove', function(e) {
        if (!isDown) return;
        e.preventDefault();
        var dx = (e.pageX - startX) * 5;
        var newScroll = scrollStart - dx;
        var maxScroll = container.scrollWidth - container.clientWidth;
        container.scrollLeft = Math.max(0, Math.min(newScroll, maxScroll));
    });

    function snapToNearestPanel() {
      var vw = window.innerWidth || document.documentElement.clientWidth;
      var idx = Math.round(container.scrollLeft / vw);
      var target = idx * vw;
      container.scrollTo({ left: target, behavior: 'smooth' });
    }

    window.addEventListener('mouseup', function() {
        if (!isDown) return;
        isDown = false;
        if (scrollContent) scrollContent.classList.remove('grabbing');
        container.style.userSelect = '';
        snapToNearestPanel();
    });

    window.addEventListener('mouseleave', function() {
        if (!isDown) return;
        isDown = false;
        if (scrollContent) scrollContent.classList.remove('grabbing');
        container.style.userSelect = '';
        snapToNearestPanel();
    });

    // Nav dot + scene switch + progress bar
    var navDots = document.querySelectorAll('.nav-bar a');
    var bar = document.querySelector('.scroll-progress-bar');

    function updateAll() {
      var sl = container.scrollLeft;
      var vw = window.innerWidth || document.documentElement.clientWidth;
      var idx = Math.round(sl / vw);
      for (var i = 0; i < navDots.length; i++) {
        navDots[i].classList.toggle('active', i === idx);
        navDots[i].classList.toggle('inactive', i !== idx);
      }
      document.body.classList.toggle('scene-2', idx === 1);
      document.body.classList.toggle('scene-3', idx === 2);
      if (bar) {
        var maxScroll = container.scrollWidth - container.clientWidth;
        var pct = maxScroll > 0 ? (sl / maxScroll) * 100 : 0;
        bar.style.width = Math.min(100, Math.max(0, pct)) + '%';
      }
    }

    container.addEventListener('scroll', updateAll);
    updateAll();
})();
</script>
</body>
